<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clefairy Game</title>
    <style>
        /* 讓整個網頁視窗變成一個滿版且置中的容器 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 改用質感的深灰色背景，襯托白色遊戲畫面 */
            display: flex;
            justify-content: center;  /* 水平置中 */
            align-items: center;      /* 垂直置中 */
            overflow: hidden;         /* 隱藏手機網頁可能出現的滾動條 */
        }

        /* 針對遊戲畫布進行智慧縮放 */
        canvas.emscripten {
            border: none;
            background-color: white;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5); /* 幫遊戲加一個帥氣的陰影 */
            max-width: 100vw;   /* 寬度最大不超過手機寬度 */
            max-height: 100vh;  /* 高度最大不超過手機高度 */
            object-fit: contain; /* 確保不管怎麼縮放，都不會變形 */
        }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type='text/javascript'>
        // 告訴 Emscripten 把遊戲畫面渲染到上面的 canvas 標籤中
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })()
        };
    </script>
    
    <script async type="text/javascript" src="DinoGame.js"></script>
</body>
</html>
